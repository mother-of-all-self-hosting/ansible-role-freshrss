---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - { "old": "freshrss_http_header_content_permission_policy", "new": "freshrss_http_header_permissions_policy" }
    - { "old": "freshrss_database_hostname", "new": "freshrss_database_postgres_hostname" }
    - { "old": "freshrss_database_port", "new": "freshrss_database_postgres_port" }
    - { "old": "freshrss_database_username", "new": "freshrss_database_postgres_username" }
    - { "old": "freshrss_database_password", "new": "freshrss_database_postgres_password" }
    - { "old": "freshrss_container_image_force_pull", "new": "<removed> (the new community.docker.docker_image_pull module handles this natively)" }

- name: Fail if required FreshRSS settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item.name }}`).
  when: "item.when | bool and lookup('vars', item.name, default='') | string | length == 0"
  with_items:
    - { "name": "freshrss_uid", when: true }
    - { "name": "freshrss_gid", when: true }
    - { "name": "freshrss_hostname", when: true }
    - { "name": "freshrss_path_prefix", when: true }
    - { "name": "freshrss_container_network", when: true }
    - { "name": "freshrss_container_labels_traefik_middleware_basic_auth_users", when: "{{ freshrss_container_labels_traefik_middleware_basic_auth_enabled }}" }

- name: Fail if FreshRSS database type invalid
  ansible.builtin.fail:
    msg: >-
      freshrss_database_type must be 'mysql', 'postgres' or 'sqlite'
  when: "freshrss_database_type not in ['mysql', 'postgres', 'sqlite']"

- name: Run if FreshRSS + MySQL integration is enabled
  when: freshrss_database_type == 'mysql'
  block:
    - name: Fail if required FreshRSS + MySQL integration settings not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`) when `freshrss_database_type` is `mysql`
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - freshrss_database_mysql_password

    - name: Fail if MySQL socket host path for FreshRSS is missing when Unix socket is enabled
      ansible.builtin.fail:
        msg: >-
          You need to define `freshrss_database_mysql_socket_path_host` when `freshrss_database_type` is `mysql`
          and `freshrss_database_mysql_socket_enabled` is `true`.
      when: >-
        freshrss_database_mysql_socket_enabled and
        freshrss_database_mysql_socket_path_host | string | length == 0

    - name: Fail if MySQL hostname for FreshRSS is missing when Unix socket is disabled
      ansible.builtin.fail:
        msg: >-
          You need to define `freshrss_database_mysql_hostname` when `freshrss_database_type` is `mysql`
          and `freshrss_database_mysql_socket_enabled` is `false`.
      when: >-
        not freshrss_database_mysql_socket_enabled and
        freshrss_database_mysql_hostname | string | length == 0

- name: Run if FreshRSS + Postgres integration is enabled
  when: freshrss_database_type == 'postgres'
  block:
    - name: Fail if required FreshRSS + Postgres integration settings not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`) when `freshrss_database_type` is `postgres`
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - freshrss_database_postgres_password

    - name: Fail if Postgres socket host path for FreshRSS is missing when Unix socket is enabled
      ansible.builtin.fail:
        msg: >-
          You need to define `freshrss_database_postgres_socket_path_host` when `freshrss_database_type` is `postgres`
          and `freshrss_database_postgres_socket_enabled` is `true`.
      when: >-
        freshrss_database_postgres_socket_enabled and
        freshrss_database_postgres_socket_path_host | string | length == 0

    - name: Fail if Postgres hostname for FreshRSS is missing when Unix socket is disabled
      ansible.builtin.fail:
        msg: >-
          You need to define `freshrss_database_postgres_hostname` when `freshrss_database_type` is `postgres`
          and `freshrss_database_postgres_socket_enabled` is `false`.
      when: >-
        not freshrss_database_postgres_socket_enabled and
        freshrss_database_postgres_hostname | string | length == 0

- name: Run if Traefik is enabled
  when: freshrss_container_labels_traefik_enabled | bool
  block:
    - name: Fail if required FreshRSS Traefik settings not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - freshrss_container_labels_traefik_hostname
        - freshrss_container_labels_traefik_path_prefix

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `freshrss_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if freshrss_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          freshrss_container_labels_traefik_path_prefix (`{{ freshrss_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/freshrss`).
      when: "freshrss_container_labels_traefik_path_prefix != '/' and freshrss_container_labels_traefik_path_prefix[-1] == '/'"
